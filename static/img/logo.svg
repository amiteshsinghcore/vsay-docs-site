<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <!-- Dark rounded square background -->
  <rect width="40" height="40" rx="12" fill="#0d1f14"/>
  <!-- Terminal chevron: > -->
  <polyline points="8,14 16,20 8,26" stroke="#00e676" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor underscore: _ -->
  <line x1="19" y1="26" x2="31" y2="26" stroke="#00e676" stroke-width="2.8" stroke-linecap="round"/>
</svg>
